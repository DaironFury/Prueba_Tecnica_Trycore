# =====================================================================
# nginx configuration for the production frontend container.
#
# Two responsibilities:
#   1. Serve the React SPA, falling back to index.html for client-side
#      routes (React Router needs this — without it a hard refresh on
#      /projects/:id returns 404).
#   2. Proxy `/api/*` to the backend service inside the Docker network.
#      This eliminates CORS entirely: the browser sees a single origin.
# =====================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
